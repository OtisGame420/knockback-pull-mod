name: Build Mod

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle 8.8
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Build remapped JAR
        run: gradle remapJar --no-daemon --project-dir knockback-mod/knockback-mod

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: knockback-pull-mod
          path: knockback-mod/knockback-mod/build/libs/knockback-pull-mod-*.jar
          if-no-files-found: error
